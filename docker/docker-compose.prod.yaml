services:
  db:
    image: postgis/postgis:16-3.5-alpine
    restart: always
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${SQL_DATABASE}
      POSTGRES_USER: ${SQL_USER}
      POSTGRES_PASSWORD: ${SQL_PASSWORD}
    volumes:
      - oh4s:/var/lib/postgresql/data
      - ./db_dump.sql:/tmp/db_dump.sql:ro
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQL_USER} -d ${SQL_DATABASE} -h localhost -p ${SQL_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../app/portal
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: oh4s_web
    command: ["prod"]
    # image: ${OH4S_GHCR_PATH}:latest
    env_file:
      - path: .env.prod
        required: true
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check --deploy 2>/dev/null || python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")' 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
      - "443:443"
    env_file:
      - path: .env.prod
        required: true
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web

volumes:
  oh4s:
  static_volume:
  media_volume: