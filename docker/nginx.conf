upstream oh4s_web {
        server web:8000;
}

server {
        listen 80;
        client_max_body_size 50M;

        server_name oh4s-staging.ecotrust.dev www.oh4s-staging.ecotrust.dev;

        location / {
                return 301 https://$host$request_uri;
        }

}

server {
    listen 443 ssl;
    server_name oh4s-staging.ecotrust.dev www.oh4s-staging.ecotrust.dev;
    client_max_body_size 50M;

    access_log /var/log/nginx/oh4s.access.log;
    error_log /var/log/nginx/oh4s.error.log;

    ssl_certificate     /etc/letsencrypt/live/oh4s-staging.ecotrust.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oh4s-staging.ecotrust.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://oh4s_web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}
